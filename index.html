    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg: #eef3f8;
                <div class="eyebrow">Executive IT View</div>
                <h1>Дашборд задач IT-директора</h1>
                <div class="hero-meta">
                    <span>Источник: локальный экспорт задач</span>
                    <span>Источник: <strong id="source-label">Google Sheets</strong></span>
                    <span>Обновлено: <strong id="last-update">загрузка...</strong></span>
                    <span>Ответственных: <strong id="responsible-count">-</strong></span>
                </div>
    </main>

    <script>
        const DATA_SOURCE = "./tasks_2026-04-20_17_26_02.xls";
        const DATA_SOURCES = {
            primaryCsv: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSkWl7Whkp0ae00GwDZDkABz6HYDvgwen0zmFa7814DHlvJppZHWv8Jya586vhp1UWXfBgPfWDD2zun/pub?gid=0&single=true&output=csv",
            fallbackHtml: "./tasks_2026-04-20_17_26_02.xls"
        };
        const STATUS_ORDER = ["Все", "Пауза", "В работе", "Тестирование", "Выполнено"];
        const STATUS_COLORS = {
            "Пауза": "#4e79e8",
            }, {});
        }

        function parseSource(html) {
            const parser = new DOMParser();
            const documentNode = parser.parseFromString(html, "text/html");
            const rows = Array.from(documentNode.querySelectorAll("tbody tr"));
            const rawTasks = rows
                .map((row) => Array.from(row.querySelectorAll("td")).map((cell) => cell.textContent.trim()))
                .filter((cells) => cells.length >= 6)
                .map((cells) => ({
                    title: cells[0] || "Без названия",
                    lastActivityRaw: cells[1] || "",
                    deadline: cells[2] || "",
                    author: cells[3] || "Не указан",
                    assignee: cells[4] || "Не назначен",
                    project: cells[5] || "Без проекта",
                    tags: splitTags(cells[6] || "")
                }));
        function pickField(record, candidates) {
            for (const candidate of candidates) {
                const value = record[candidate];
                if (value !== undefined && value !== null && String(value).trim() !== "") {
                    return String(value).trim();
                }
            }

            return "";
        }

        function buildTaskModels(rawTasks) {
            const latestActivity = rawTasks.reduce((max, task) => {
                const date = parseDate(task.lastActivityRaw);
                if (!date) return max;
                });
        }

        function parseCsvSource(csvText) {
            const result = Papa.parse(csvText, {
                header: true,
                skipEmptyLines: true,
                transformHeader: (header) => String(header).replace(/^\uFEFF/, "").trim()
            });

            if (result.errors?.length) {
                const blockingError = result.errors.find((error) => error.code !== "TooFewFields");
                if (blockingError) {
                    throw new Error(`CSV parsing error: ${blockingError.message}`);
                }
            }

            const rawTasks = result.data
                .map((record) => ({
                    title: pickField(record, ["Название", "Задача", "Task", "title"]) || "Без названия",
                    lastActivityRaw: pickField(record, ["Последняя активность", "Обновлено", "Last activity", "lastActivity"]),
                    deadline: pickField(record, ["Крайний срок", "Deadline", "deadline"]),
                    author: pickField(record, ["Постановщик", "Автор", "Requester", "author"]) || "Не указан",
                    assignee: pickField(record, ["Исполнитель", "Ответственный", "Assignee", "assignee"]) || "Не назначен",
                    project: pickField(record, ["Проект", "Project", "project"]) || "Без проекта",
                    tags: splitTags(pickField(record, ["Теги", "Tags", "tags"]))
                }))
                .filter((task) => task.title !== "Без названия" || task.assignee !== "Не назначен" || task.project !== "Без проекта");

            if (!rawTasks.length) {
                throw new Error("В Google Sheets не найдено ни одной строки с задачами");
            }

            return buildTaskModels(rawTasks);
        }

        function parseHtmlSource(html) {
            const parser = new DOMParser();
            const documentNode = parser.parseFromString(html, "text/html");
            const rows = Array.from(documentNode.querySelectorAll("tbody tr"));
            const rawTasks = rows
                .map((row) => Array.from(row.querySelectorAll("td")).map((cell) => cell.textContent.trim()))
                .filter((cells) => cells.length >= 6)
                .map((cells) => ({
                    title: cells[0] || "Без названия",
                    lastActivityRaw: cells[1] || "",
                    deadline: cells[2] || "",
                    author: cells[3] || "Не указан",
                    assignee: cells[4] || "Не назначен",
                    project: cells[5] || "Без проекта",
                    tags: splitTags(cells[6] || "")
                }));

            if (!rawTasks.length) {
                throw new Error("Локальный XLS не содержит строк с задачами");
            }

            return buildTaskModels(rawTasks);
        }

        async function loadText(url) {
            const response = await fetch(url, { cache: "no-store" });
            if (!response.ok) {
                throw new Error(`Источник не открылся: ${response.status}`);
            }

            return response.text();
        }

        function renderKpis(tasks) {
            const completed = tasks.filter((task) => task.status === "Выполнено").length;
            const active = tasks.filter((task) => task.status === "В работе" || task.status === "Тестирование").length;
            tableBody.innerHTML = `
                <tr>
                    <td colspan="7">
                        <div class="center-state loading">Перечитываю экспорт и обновляю таблицу...</div>
                        <div class="center-state loading">Подтягиваю данные из Google Sheets и обновляю таблицу...</div>
                    </td>
                </tr>
            `;

            try {
                const response = await fetch(DATA_SOURCE, { cache: "no-store" });
                if (!response.ok) {
                    throw new Error(`Источник не открылся: ${response.status}`);
                }
                let sourceLabel = "Google Sheets";

                const html = await response.text();
                state.tasks = parseSource(html);
                try {
                    const csvText = await loadText(DATA_SOURCES.primaryCsv);
                    state.tasks = parseCsvSource(csvText);
                } catch (primaryError) {
                    const html = await loadText(DATA_SOURCES.fallbackHtml);
                    state.tasks = parseHtmlSource(html);
                    sourceLabel = "Локальный fallback";
                }
                const latestActivity = state.tasks.reduce((latest, task) => {
                    if (!task.lastActivity) {
                        return latest;

                document.getElementById("last-update").textContent = formatDate(latestActivity);
                document.getElementById("responsible-count").textContent = responsibleCount;
                document.getElementById("source-label").textContent = sourceLabel;

                renderKpis(state.tasks);
                renderAttention(state.tasks);
                renderCharts(state.tasks);
                applyFilters();
            } catch (error) {
                attentionList.innerHTML = `<div class="center-state">Не удалось прочитать файл задач.<br>${escapeHtml(error.message)}</div>`;
                document.getElementById("source-label").textContent = "Источник недоступен";
                attentionList.innerHTML = `<div class="center-state">Не удалось загрузить задачи из Google Sheets и fallback-файла.<br>${escapeHtml(error.message)}</div>`;
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="center-state">Проверьте, что рядом со страницей лежит файл <strong>tasks_2026-04-20_17_26_02.xls</strong>.</div>
                            <div class="center-state">Проверьте публикацию CSV в Google Sheets и наличие рядом файла <strong>tasks_2026-04-20_17_26_02.xls</strong>.</div>
                        </td>
                    </tr>
                `;
